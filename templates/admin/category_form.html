{% extends "base.html" %}

{% block title %}{{ title }} - Любимый хвостик{% endblock %}

{% block content %}
<section class="form-page admin-form-page">
    <h1>{{ title }}</h1>
    <form method="post" class="admin-form">
        <label>
            Название
            <input type="text" name="name" value="{{ category.name or '' }}" required>
        </label>
        <button class="button" type="submit">Сохранить</button>
    </form>
</section>
{% endblock %}
