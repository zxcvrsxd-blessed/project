{% extends "base.html" %}

{% block title %}{{ title }} - Любимый хвостик{% endblock %}

{% block content %}
<section class="form-page admin-form-page">
    <h1>{{ title }}</h1>
    <form method="post" enctype="multipart/form-data" class="admin-form">
        <label>
            Заголовок
            <input type="text" name="title" value="{{ announcement.title or '' }}" required>
        </label>
        <label>
            Текст
            <textarea name="text" rows="8" required>{{ announcement.text or '' }}</textarea>
        </label>
        <label>
            Изображение
            <input type="file" name="image" accept=".jpg,.jpeg,.png,.webp">
        </label>
        <button class="button" type="submit">Сохранить</button>
    </form>
</section>
{% endblock %}
